<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girlhood Spectrum</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>

<!-- Texto do topo -->
<header class="top-header">
  <h1>Girlhood Spectrum</h1>
  <p class="subtitle">Sentimentos suaves · Espaço partilhado 🌷</p>
</header>

<!-- Caixa de login central -->
<main class="center-container">
  <section class="login-box">
    <p class="big-text">Um cantinho da internet para os teus sentimentos</p><br>
    <p class="small-text">Sem pressão · Sem julgamentos · Só tu</p>
  
    <form id="loginForm">
      <label for="usernameInput"><strong>Teu nome:</strong></label><br>
      <input 
        type="text" 
        id="usernameInput" 
        name="user"
        placeholder="ex: Luna 🌸"
        required>
      <br>

      <button id="submitBtn" type="submit">continuar →</button>
    </form><br>

    <p class="hint">Apenas o teu nome, nada mais é necessário</p>
  </section>
</main>

<footer>
  <p>© 2026 Girlhood Spectrum</p>
</footer>

</body>
</html>
